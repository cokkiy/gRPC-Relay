apiVersion: v1
kind: Secret
metadata:
  name: relay-secrets
  namespace: relay-system
  labels:
    app.kubernetes.io/part-of: grpc-relay
type: Opaque
stringData:
  # Generate a real secret: openssl rand -hex 32
  jwt-hs256-secret: "<generate-random-secret>"
  # TLS certificate and key (replace with real values before enabling relay.tls.enabled)
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    <replace-with-real-certificate>
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    <replace-with-real-private-key>
    -----END PRIVATE KEY-----
