apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: relay-system
namePrefix: grpc-relay-

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize

images:
  - name: grpc-relay
    newTag: latest
