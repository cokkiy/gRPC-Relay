apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: relay-network-policy
  namespace: relay-system
  labels:
    app.kubernetes.io/part-of: grpc-relay
spec:
  podSelector:
    matchLabels:
      app: relay
  policyTypes:
    - Ingress
  ingress:
    # Allow gRPC from controllers
    - ports:
        - protocol: TCP
          port: 50051
    # Allow QUIC from devices
    - ports:
        - protocol: UDP
          port: 50052
    # Allow health/metrics from monitoring (within namespace or labeled pods)
    - ports:
        - protocol: TCP
          port: 8080
