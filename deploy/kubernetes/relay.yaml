apiVersion: v1
kind: Namespace
metadata:
  name: relay-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: relay-config
  namespace: relay-system
data:
  relay.yaml: |
    relay:
      id: relay-001
      address: 0.0.0.0:50051
      quic_address: 0.0.0.0:50052
      max_device_connections: 10000
      heartbeat_interval_seconds: 30
    observability:
      logging:
        level: info
        format: json
      health:
        enabled: true
        address: 0.0.0.0:8080
        path: /health
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay
  namespace: relay-system
  labels:
    app: relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: relay
  template:
    metadata:
      labels:
        app: relay
    spec:
      containers:
        - name: relay
          image: grpc-relay:latest
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/relay/relay.yaml"]
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: quic
              containerPort: 50052
              protocol: UDP
            - name: health
              containerPort: 8080
              protocol: TCP
          env:
            - name: RELAY_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RUST_LOG
              value: info
          volumeMounts:
            - name: config
              mountPath: /etc/relay
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: config
          configMap:
            name: relay-config
---
apiVersion: v1
kind: Service
metadata:
  name: relay
  namespace: relay-system
spec:
  selector:
    app: relay
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
    - name: quic
      port: 50052
      targetPort: 50052
      protocol: UDP
    - name: health
      port: 8080
      targetPort: 8080
      protocol: TCP
