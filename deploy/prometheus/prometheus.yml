global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: "relay"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["relay:8080"]
        labels:
          service: "grpc-relay"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
