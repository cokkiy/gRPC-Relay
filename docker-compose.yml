services:
  relay:
    build: .
    image: grpc-relay:latest
    container_name: relay-001
    ports:
      - "50051:50051"
      - "50052:50052/udp"
      - "8080:8080"
    volumes:
      - ./config/relay.yaml:/etc/relay/relay.yaml:ro
    environment:
      RELAY_ID: relay-001
      RUST_LOG: info
      RELAY__MQTT__BROKER_ADDRESS: mqtt:1883
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    restart: unless-stopped
