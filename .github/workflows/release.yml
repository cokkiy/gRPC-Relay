name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to release (e.g., v1.0.0-rc1)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  publish-sdk-crates:
    name: Publish SDK Crates To crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag_name }}"
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.tag_name }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-publish

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Verify release tag matches workspace version
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag_name }}
        run: |
          python - <<'PY'
          import os
          import sys
          import tomllib

          with open("Cargo.toml", "rb") as f:
              cargo_toml = tomllib.load(f)

          version = cargo_toml["workspace"]["package"]["version"]
          expected_tag = f"v{version}"
          actual_tag = os.environ["RELEASE_TAG"]

          if actual_tag != expected_tag:
              print(
                  f"Release tag mismatch: expected '{expected_tag}' from workspace.package.version, got '{actual_tag}'.",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      - name: Define crates.io publish helper
        run: |
          cat > "$RUNNER_TEMP/publish-crate-if-missing.sh" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          CRATE="$1"
          PACKAGE="${2:-$CRATE}"
          ENV_PREFIX="${3:-}"

          VERSION="$(cargo metadata --no-deps --format-version 1 | python -c 'import json, sys; data = json.load(sys.stdin); crate = sys.argv[1]; print(next(pkg["version"] for pkg in data["packages"] if pkg["name"] == crate))' "$CRATE")"

          if [ -n "$ENV_PREFIX" ]; then
            echo "${ENV_PREFIX}_VERSION=$VERSION" >> "$GITHUB_ENV"
          fi

          # crates.io does not allow overwriting a published crate version. Query
          # the crate metadata and skip exact version matches so release reruns
          # stay idempotent.
          EXISTS="$(python - "$CRATE" "$VERSION" <<'PY'
          import json
          import sys
          import urllib.error
          import urllib.request

          crate = sys.argv[1]
          version = sys.argv[2]
          url = f"https://crates.io/api/v1/crates/{crate}"
          request = urllib.request.Request(
              url,
              headers={"User-Agent": "gRPC-Relay release workflow"},
          )

          try:
              with urllib.request.urlopen(request, timeout=20) as response:
                  if response.status != 200:
                      print(f"metadata request returned HTTP {response.status}", file=sys.stderr)
                      sys.exit(2)
                  data = json.load(response)
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  print("false")
                  sys.exit(0)
              print(f"metadata request returned HTTP {error.code}", file=sys.stderr)
              sys.exit(2)
          except (urllib.error.URLError, TimeoutError, json.JSONDecodeError) as error:
              print(f"metadata request failed: {error}", file=sys.stderr)
              sys.exit(2)

          print("true" if any(item.get("num") == version for item in data.get("versions", [])) else "false")
          PY
          )"

          if [ "$EXISTS" = "true" ]; then
            echo "::notice::$CRATE $VERSION is already on crates.io, skipping publish"
            if [ -n "$ENV_PREFIX" ]; then
              echo "${ENV_PREFIX}_ALREADY_PUBLISHED=true" >> "$GITHUB_ENV"
            fi
            exit 0
          fi

          cargo publish -p "$PACKAGE"

          if [ -n "$ENV_PREFIX" ]; then
            echo "${ENV_PREFIX}_ALREADY_PUBLISHED=false" >> "$GITHUB_ENV"
          fi
          SH
          chmod +x "$RUNNER_TEMP/publish-crate-if-missing.sh"

      - name: Publish relay-proto
        id: publish-relay-proto
        run: |
          "$RUNNER_TEMP/publish-crate-if-missing.sh" relay-proto relay-proto RELAY_PROTO

      - name: Wait for relay-proto index propagation
        if: env.RELAY_PROTO_ALREADY_PUBLISHED != 'true'
        run: |
          python <<'PYEOF'
          import json, sys, time, urllib.request, urllib.error, os

          version = os.environ["RELAY_PROTO_VERSION"]
          url = "https://crates.io/api/v1/crates/relay-proto"
          request = urllib.request.Request(
              url,
              headers={"User-Agent": "gRPC-Relay release workflow"},
          )

          for attempt in range(1, 31):
              print(f"Checking crates.io for relay-proto {version} (attempt {attempt}/30)...")
              try:
                  with urllib.request.urlopen(request, timeout=10) as resp:
                      if resp.status != 200:
                          print(f"HTTP {resp.status}, retrying...")
                          time.sleep(10)
                          continue
                      data = json.load(resp)
              except (urllib.error.URLError, json.JSONDecodeError) as e:
                  print(f"Request/JSON error: {e}, retrying...")
                  time.sleep(10)
                  continue
              except Exception as e:
                  print(f"Unexpected error: {e}, retrying...")
                  time.sleep(10)
                  continue

              if any(v["num"] == version for v in data.get("versions", [])):
                  print(f"relay-proto {version} is available on crates.io")
                  sys.exit(0)

              print(f"Version {version} not yet found, retrying...")
              time.sleep(10)

          print(f"Timed out waiting for relay-proto {version}", file=sys.stderr)
          sys.exit(1)
          PYEOF

      - name: Publish device-sdk
        run: |
          "$RUNNER_TEMP/publish-crate-if-missing.sh" device-sdk

      - name: Publish controller-sdk
        run: |
          "$RUNNER_TEMP/publish-crate-if-missing.sh" controller-sdk

  docker-release:
    name: Build And Publish Release Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag_name }}"
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set lowercase image name
        run: echo "REGISTRY_IMAGE=ghcr.io/$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.tag.outputs.tag_name }}
            type=sha
          labels: |
            org.opencontainers.image.title=gRPC-Relay
            org.opencontainers.image.description=Cross-network gRPC relay server
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.tag.outputs.tag_name }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
