name: Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  publish-sdk-crates:
    name: Publish SDK Crates To crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-publish

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Verify release tag matches workspace version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import sys
          import tomllib

          with open("Cargo.toml", "rb") as f:
              cargo_toml = tomllib.load(f)

          version = cargo_toml["workspace"]["package"]["version"]
          expected_tag = f"v{version}"
          actual_tag = os.environ["RELEASE_TAG"]

          if actual_tag != expected_tag:
              print(
                  f"Release tag mismatch: expected '{expected_tag}' from workspace.package.version, got '{actual_tag}'.",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      - name: Publish relay-proto
        run: |
          cargo publish -p relay-proto
          relay_proto_version="$(cargo metadata --no-deps --format-version 1 | python -c 'import json, sys; data = json.load(sys.stdin); print(next(pkg["version"] for pkg in data["packages"] if pkg["name"] == "relay-proto"))')"
          echo "RELAY_PROTO_VERSION=$relay_proto_version" >> "$GITHUB_ENV"

      - name: Wait for relay-proto index propagation
        run: |
          python <<'PYEOF'
          import json, sys, time, urllib.request, urllib.error, os

          version = os.environ["RELAY_PROTO_VERSION"]
          url = "https://crates.io/api/v1/crates/relay-proto"

          for attempt in range(1, 31):
              print(f"Checking crates.io for relay-proto {version} (attempt {attempt}/30)...")
              try:
                  with urllib.request.urlopen(url, timeout=10) as resp:
                      if resp.status != 200:
                          print(f"HTTP {resp.status}, retrying...")
                          time.sleep(10)
                          continue
                      data = json.load(resp)
              except (urllib.error.URLError, json.JSONDecodeError) as e:
                  print(f"Request/JSON error: {e}, retrying...")
                  time.sleep(10)
                  continue
              except Exception as e:
                  print(f"Unexpected error: {e}, retrying...")
                  time.sleep(10)
                  continue

              if any(v["num"] == version for v in data.get("versions", [])):
                  print(f"relay-proto {version} is available on crates.io")
                  sys.exit(0)

              print(f"Version {version} not yet found, retrying...")
              time.sleep(10)

          print(f"Timed out waiting for relay-proto {version}", file=sys.stderr)
          sys.exit(1)
          PYEOF

      - name: Publish device-sdk
        run: cargo publish -p device-sdk

      - name: Publish controller-sdk
        run: cargo publish -p controller-sdk

  docker-release:
    name: Build And Publish Release Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set lowercase image name
        run: echo "REGISTRY_IMAGE=ghcr.io/$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.release.tag_name }}
            type=sha
          labels: |
            org.opencontainers.image.title=gRPC-Relay
            org.opencontainers.image.description=Cross-network gRPC relay server
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max